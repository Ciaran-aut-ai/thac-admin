<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Job Detail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

const params = new URLSearchParams(window.location.search);
const jobId = params.get('id');
let job = null;

if (!jobId) window.location.href = 'jobs.html';

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('jobs')}
    <div class="main-content">
      <div class="topbar">
        <a href="jobs.html" class="btn btn-secondary btn-sm">← Back</a>
        <div class="topbar-title" id="pageTitle">Job Detail</div>
      </div>
      <div class="page-body" id="pageBody">
        <div class="loading"><div class="spinner"></div><br>Loading job...</div>
      </div>
    </div>
  `;

  await loadJob();
  await loadEnquiryBadge();
}

async function loadJob() {
  try {
    const data = await dbGet('jobs', { 'id': `eq.${jobId}`, 'limit': 1 });
    if (!data || data.length === 0) {
      document.getElementById('pageBody').innerHTML = `<div class="empty-state"><h3>Job not found</h3></div>`;
      return;
    }

    job = data[0];
    document.getElementById('pageTitle').textContent = job.reference || 'Job Detail';
    renderJob();
  } catch (e) {
    document.getElementById('pageBody').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

function renderJob() {
  document.getElementById('pageBody').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-ref">${job.reference || '—'}</div>
        <div class="detail-sub">${getSurveyLabel(job.job_type)}</div>
      </div>
      <div style="margin-left:auto;">
        ${statusBadge(job.status)}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;">
      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Property -->
        <div class="card">
          <div class="card-title">Property Details</div>
          <div class="detail-grid">
            <div class="detail-field" style="grid-column:1/-1">
              <label>Address</label>
              <div class="field-value">
                ${job.property_address || '—'}
                ${job.property_address ? `<br><a href="https://maps.google.com/?q=${encodeURIComponent(job.property_address)}" target="_blank" style="font-size:12px;color:var(--green-mid);">View on Google Maps →</a>` : ''}
              </div>
            </div>
            <div class="detail-field">
              <label>Suburb</label>
              <div class="field-value">${job.property_suburb || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Postcode</label>
              <div class="field-value">${job.property_postcode || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Property Type</label>
              <div class="field-value">${job.property_type ? job.property_type.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()) : '—'}</div>
            </div>
            <div class="detail-field">
              <label>Bedrooms</label>
              <div class="field-value">${job.bedrooms || '—'}</div>
            </div>
          </div>
        </div>

        <!-- Scheduling -->
        <div class="card">
          <div class="card-title">Scheduling</div>
          <div class="detail-grid">
            <div class="detail-field">
              <label>Scheduled Date</label>
              <div class="field-value">${formatDate(job.scheduled_date)}</div>
            </div>
            <div class="detail-field">
              <label>Scheduled Time</label>
              <div class="field-value">${job.scheduled_time || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Completed Date</label>
              <div class="field-value">${formatDate(job.completed_date)}</div>
            </div>
            <div class="detail-field">
              <label>Duration</label>
              <div class="field-value">${job.duration_mins ? job.duration_mins + ' mins' : '—'}</div>
            </div>
          </div>
        </div>

        <!-- Financial -->
        <div class="card">
          <div class="card-title">Financial</div>
          <div class="detail-grid">
            <div class="detail-field">
              <label>Agreed Price</label>
              <div class="field-value" style="font-size:20px;font-weight:700;color:var(--green-mid);">
                ${job.agreed_price ? '£' + Number(job.agreed_price).toLocaleString() : '—'}
              </div>
            </div>
            <div class="detail-field">
              <label>Invoice Number</label>
              <div class="field-value">${job.invoice_number || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Invoice Date</label>
              <div class="field-value">${formatDate(job.invoice_date)}</div>
            </div>
            <div class="detail-field">
              <label>Payment Date</label>
              <div class="field-value">${formatDate(job.payment_date)}</div>
            </div>
          </div>
        </div>

        <!-- Notes -->
        ${job.notes || job.internal_notes ? `
        <div class="card">
          <div class="card-title">Notes</div>
          ${job.notes ? `<div class="detail-field mb-16"><label>Client Notes</label><div class="field-value" style="background:var(--bg);padding:12px;border-radius:8px;line-height:1.6;">${job.notes}</div></div>` : ''}
          ${job.internal_notes ? `<div class="detail-field"><label>Internal Notes</label><div class="field-value" style="background:var(--amber-light);padding:12px;border-radius:8px;line-height:1.6;">${job.internal_notes}</div></div>` : ''}
        </div>` : ''}

      </div>

      <!-- Right column -->
      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Update Status -->
        <div class="card">
          <div class="card-title">Update Status</div>
          <div class="form-group">
            <label>Job Status</label>
            <select class="form-control" id="statusSelect">
              <option value="enquiry"     ${job.status==='enquiry'     ?'selected':''}>Enquiry</option>
              <option value="quote_sent"  ${job.status==='quote_sent'  ?'selected':''}>Quote Sent</option>
              <option value="confirmed"   ${job.status==='confirmed'   ?'selected':''}>Confirmed</option>
              <option value="scheduled"   ${job.status==='scheduled'   ?'selected':''}>Scheduled</option>
              <option value="in_progress" ${job.status==='in_progress' ?'selected':''}>In Progress</option>
              <option value="completed"   ${job.status==='completed'   ?'selected':''}>Completed</option>
              <option value="report_sent" ${job.status==='report_sent' ?'selected':''}>Report Sent</option>
              <option value="invoiced"    ${job.status==='invoiced'    ?'selected':''}>Invoiced</option>
              <option value="paid"        ${job.status==='paid'        ?'selected':''}>Paid</option>
              <option value="cancelled"   ${job.status==='cancelled'   ?'selected':''}>Cancelled</option>
            </select>
          </div>
          <button class="btn btn-primary w-100" onclick="updateStatus()" style="justify-content:center;">Save Status</button>
        </div>

        <!-- Quick Actions -->
        <div class="card">
          <div class="card-title">Quick Actions</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button class="btn btn-secondary w-100" style="justify-content:center;" onclick="showToast('Report tracking coming in Sprint 2','warning')">
              📄 Upload Report
            </button>
            <button class="btn btn-secondary w-100" style="justify-content:center;" onclick="showToast('Invoicing tracking coming in Sprint 2','warning')">
              🧾 Mark Invoiced
            </button>
            <button class="btn btn-secondary w-100" style="justify-content:center;" onclick="showToast('Surveyor dispatch coming in Sprint 3','warning')">
              📍 Dispatch to Map
            </button>
          </div>
        </div>

      </div>
    </div>
  `;
}

async function updateStatus() {
  const newStatus = document.getElementById('statusSelect').value;
  try {
    await dbUpdate('jobs', `id=eq.${jobId}`, { status: newStatus });
    job.status = newStatus;
    showToast('Status updated successfully');
    renderJob();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

init();
</script>
</body>
</html>
