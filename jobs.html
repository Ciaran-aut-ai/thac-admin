<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

let allJobs = [];
let activeFilter = 'all';
let searchQuery = '';

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('jobs')}
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">Jobs</div>
        <div class="topbar-search">
          <span>🔍</span>
          <input type="text" placeholder="Search by ref, client, postcode..." oninput="handleSearch(this.value)">
        </div>
      </div>
      <div class="page-body">
        <div class="card">
          <div class="card-title">
            All Jobs
            <span style="font-size:13px;font-weight:400;color:var(--text-muted)" id="jobCount"></span>
          </div>

          <div class="filter-bar">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('enquiry', this)">Enquiry</button>
            <button class="filter-btn" onclick="setFilter('confirmed', this)">Confirmed</button>
            <button class="filter-btn" onclick="setFilter('scheduled', this)">Scheduled</button>
            <button class="filter-btn" onclick="setFilter('in_progress', this)">In Progress</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
            <button class="filter-btn" onclick="setFilter('invoiced', this)">Invoiced</button>
            <button class="filter-btn" onclick="setFilter('paid', this)">Paid</button>
          </div>

          <div id="jobsTable"><div class="loading"><div class="spinner"></div><br>Loading jobs...</div></div>
        </div>
      </div>
    </div>
  `;

  await loadJobs();
  await loadEnquiryBadge();
}

async function loadJobs() {
  try {
    const data = await dbGet('jobs', {
      'select': 'id,job_number,job_type,status,property_address,property_suburb,property_postcode,scheduled_date,agreed_price,client_id,surveyor_id',
      'order': 'created_at.desc',
      'limit': 100
    });

    allJobs = data || [];
    renderTable();
  } catch (e) {
    document.getElementById('jobsTable').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

function renderTable() {
  let filtered = allJobs;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(j => j.status === activeFilter);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(j =>
      (j.job_number || '').toLowerCase().includes(q) ||
      (j.property_address || '').toLowerCase().includes(q) ||
      (j.property_postcode || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('jobCount').textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('jobsTable').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💼</div>
        <h3>No jobs found</h3>
        <p>Jobs will appear here once enquiries are converted</p>
      </div>`;
    return;
  }

  const rows = filtered.map(j => `
    <tr onclick="window.location.href='job-detail.html?id=${j.id}'" style="cursor:pointer">
      <td><div class="ref">${j.job_number || '—'}</div></td>
      <td>
        <div style="font-size:13px;">${j.property_address || '—'}</div>
        <div class="muted">${j.property_suburb || ''} ${j.property_postcode || ''}</div>
      </td>
      <td>${getSurveyLabel(j.job_type)}</td>
      <td>${j.scheduled_date ? formatDate(j.scheduled_date) : '<span class="muted">TBC</span>'}</td>
      <td>${j.agreed_price ? '£' + Number(j.agreed_price).toLocaleString() : '<span class="muted">—</span>'}</td>
      <td>${statusBadge(j.status)}</td>
    </tr>
  `).join('');

  document.getElementById('jobsTable').innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Job Ref</th>
          <th>Property</th>
          <th>Survey Type</th>
          <th>Scheduled</th>
          <th>Value</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function handleSearch(q) {
  searchQuery = q;
  renderTable();
}

init();
</script>
</body>
</html>
